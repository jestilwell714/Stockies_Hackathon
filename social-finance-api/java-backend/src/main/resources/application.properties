spring.application.name=social-finance-api

# H2 Console Settings
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Database Connection
# Defaults keep local H2 working. Override these env vars to point at Supabase Postgres.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:stockiesdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

# Python classifier
classifier.url=${CLASSIFIER_URL:http://localhost:8000/classify-one}

# Demo bootstrap. Set APP_SEED_DEMO_DATA=false when pointing at a managed DB you do not want seeded.
app.seed-demo-data=${APP_SEED_DEMO_DATA:true}
