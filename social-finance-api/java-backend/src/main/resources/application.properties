spring.application.name=social-finance-api

# H2 is intentionally disabled for runtime. The app should fail startup if
# Supabase/Postgres env vars are missing instead of silently using local memory.
spring.h2.console.enabled=false

# Database Connection
# These must be provided by social-finance-api/java-backend/.env via scripts/run-backend.sh.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

# Python classifier
classifier.url=${CLASSIFIER_URL:http://localhost:8000/classify-one}

# Demo bootstrap. Set APP_SEED_DEMO_DATA=false when pointing at a managed DB you do not want seeded.
app.seed-demo-data=${APP_SEED_DEMO_DATA:true}
