spring.application.name=social-finance-api

# Supabase Postgres JDBC URL. Use the connection pooler URL from Supabase.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-0-region.pooler.supabase.com:6543/postgres?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.your-project-ref}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your-supabase-database-password}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# Python classifier
classifier.url=${CLASSIFIER_URL:http://localhost:8000/classify-one}

# Set false if your Supabase database already has demo rows.
app.seed-demo-data=${APP_SEED_DEMO_DATA:true}
